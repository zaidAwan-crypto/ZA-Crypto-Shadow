<script>
    let activeLayer = 1;

    function switchLayer(layerNum) {

    function clearTerminal() {
        document.getElementById('main-input').value = "";
        document.getElementById('secret-key').value = "";
        document.getElementById('output-text').innerText = "";
        document.getElementById('output-zone').style.display = 'none';

    function processCrypto(isEncrypt) {
        const inputData = document.getElementById('main-input').value.trim();
        const key = document.getElementById('secret-key').value.trim();
        const outputZone = document.getElementById('output-zone');
        const outputText = document.getElementById('output-text');
        const waBtn = document.getElementById('wa-share-btn');

        if (!inputData || !key) {
            alert("SYSTEM ERROR: Input Text and Secret Key required!");
            return;
        }

        let result = "";

        if (isEncrypt) {
            if (activeLayer === 1) {
                let initial = btoa(unescape(encodeURIComponent(inputData)));
                result = "L1-" + btoa(unescape(encodeURIComponent(initial + "[KEY]:" + key)));
            } 
            else if (activeLayer === 2) {
                let salted = inputData + "||" + key;
                let hexArr = [];
                for (let i = 0; i < salted.length; i++) {
                    hexArr.push((salted.charCodeAt(i) ^ 42).toString(16));
                }
                result = "L2-" + hexArr.join("☠️");
            }

                let combined = inputData + "::" + key;
                let encoded = btoa(combined);
                let symbolMap = { 'A': '₹', 'E': '🔑', 'I': '🔥', 'O': '💎', 'U': '⚡', 'a': '♠', 'e': '♣', 'i': '♥', 'o': '♦', 'u': '★' };
                result = "L3-" + encoded.split('').map(char => symbolMap[char] || char).join('');
            }
            
            waBtn.style.display = 'block';
            document.getElementById('output-title').innerText = `Encrypted via Layer ${activeLayer}:`;
        } else {
            try {
                if (activeLayer === 1 && inputData.startsWith("L1-")) {
                    let cleanData = inputData.substring(3);
                    let step1 = decodeURIComponent(escape(atob(cleanData)));
                    if (step1.endsWith("[KEY]:" + key)) {
                        let originalBase = step1.split("[KEY]:")[0];
                        result = decodeURIComponent(escape(atob(originalBase)));
                    } else { throw new Error(); }
                } 
                else if (activeLayer === 2 && inputData.startsWith("L2-")) {
                    let cleanData = inputData.substring(3);
                    let hexArr = cleanData.split("☠️");
                    let decryptedStr = "";
                    for (let i = 0; i < hexArr.length; i++) {
                        decryptedStr += String.fromCharCode(parseInt(hexArr[i], 16) ^ 42);
                    }
                    if (decryptedStr.endsWith("||" + key)) {
                        result = decryptedStr.split("||")[0];
                    } else { throw new Error(); }
                } 
                else if (activeLayer === 3 && inputData.startsWith("L3-")) {
                    let cleanData = inputData.substring(3);
                    let reverseMap = { '₹': 'A', '🔑': 'E', '🔥': 'I', '💎': 'O', '⚡': 'U', '♠': 'a', '♣': 'e', '♥': 'i', '♦': 'o', '★': 'u' };
                    
                    // FIX: Emojis ko todne se bachane ke liye Array.from ka use kiya hai
                    let charsArray = Array.from(cleanData);
                    let restoredB64 = charsArray.map(char => reverseMap[char] || char).join('');
                    
                    let decryptedStr = atob(restoredB64);
                    if (decryptedStr.endsWith("::" + key)) {
                        result = decryptedStr.split("::")[0];
                    } else { throw new Error(); }
                } 
                else {
                    result = "⚠️ CORE ERROR: Security Layer mismatch! Open correct gate section.";
                }
            } catch (e) {

            }
            waBtn.style.display = 'none';
            document.getElementById('output-title').innerText = "Decoded Secure Output:";
        }

        outputText.innerText = result;
        outputZone.style.display = 'block';
    }
